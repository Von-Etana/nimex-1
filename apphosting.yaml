kind: "AppHostingYaml"
apiVersion: "v1beta1"

# Configuration for the build process
buildConfig:
  # The command used to build the app
  buildCommand: "npm run build"
  # The output directory where built static files are located
  outputDirectory: "dist"

# Configuration for the runtime environment
runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  maxInstances: 10

# Environment variables available at build and run time
# These should be configured as Secrets in the Firebase App Hosting console
env:
  - variable: VITE_FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    value: "nimex-ecommerce.firebaseapp.com"
  - variable: VITE_FIREBASE_PROJECT_ID
    value: "nimex-ecommerce"
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    value: "nimex-ecommerce.appspot.com"
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    value: "712345678901"
  - variable: VITE_FIREBASE_APP_ID
    value: "1:712345678901:web:abcdef123456"
  - variable: VITE_PAYSTACK_PUBLIC_KEY
    secret: PAYSTACK_PUBLIC_KEY
  - variable: VITE_GOOGLE_MAPS_API_KEY
    secret: GOOGLE_MAPS_API_KEY
  - variable: VITE_TWILIO_ACCOUNT_SID
    secret: TWILIO_ACCOUNT_SID
  - variable: VITE_TWILIO_AUTH_TOKEN
    secret: TWILIO_AUTH_TOKEN
